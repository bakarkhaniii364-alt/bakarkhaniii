<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aperture Science Portal Chambers</title>
    <style>
        body {
            background-color: #080a0f;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }
        .container {
            max-width: 500px;
            padding: 30px;
            background: rgba(12, 17, 24, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }
        h2 {
            color: #00bcff;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 0;
        }
        p {
            color: #8c9ba5;
            line-height: 1.6;
        }
        .btn {
            background: linear-gradient(135deg, #00bcff, #0084ff);
            color: white;
            border: none;
            padding: 12px 30px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-decoration: none;
            display: inline-block;
            margin-top: 15px;
            box-shadow: 0 5px 15px rgba(0, 188, 255, 0.3);
        }
    </style>
    <script>
        setTimeout(() => {
            window.location.href = "index.html";
        }, 1500);
    </script>
</head>
<body>
    <div class="container">
        <h2>System Re-alignment</h2>
        <p>Loading the new modular Aperture Science Test Chambers engine...</p>
        <a href="index.html" class="btn">Launch Immediately</a>
    </div>
</body>
</html>
